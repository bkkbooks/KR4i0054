body:
  text: 藝圃擷餘明王世懋撰詩四始之體惟頌專為郊廟頌述功德而作其它率因觸物比類宣其性情恍惚遊衍往往無定以故説詩者人自為見若孟軻荀卿之徒及漢韓嬰劉向等或因事傅會或旁解曲引而春秋時王公大夫賦詩以昭儉汰亦各以其意為之蓋詩之來固如此後世惟十九首猶存此意使人擊節詠歎而未能盡究指歸次則阮公詠懷亦自深於寄託潘陸而後雖為四言詩聨比牽合蕩然無情蓋至於今餞送投贈之作七言四韻援引故事麗以姓名象以品地而拘攣極矣豈所謂詩之極變乎故余謂十九首五言之詩經也潘陸而後四言之排律也當以質之識者今人作詩必入故事有持清虛之説者謂盛唐詩即景造意何嘗有此是則然矣然亦一家言未盡古今之變也古詩兩漢以來曺子建出而始為宏肆多生情態此一變也自此作者多入史語然不能入經語謝靈運出而易辭莊語無所不為用矣剪裁之妙千古為宗又一變也中間何庾加工沈宋增麗而變態未極七言猶以間雅為致杜子美出而百家稗官都作雅音馬浡牛溲咸成欎致於是詩之變極矣子美之後而欲令人毁靚妝張空弮以當市肆萬人之觀必不能也其援引不得不日加而繁然病不在故事顧所以用之何如耳善使故事者勿為故事所使如禪家云轉法華勿為法華轉使事之妙在有而若無實而若虛可意悟不可言傳可力學得不可倉卒得也宋人使事最多而最不善使故詩道衰我朝越宋繼唐正以有豪傑數輩得使事三昧耳苐恐二十年後必有厭而掃除者則其濫觴末弩為之也作古詩先須辨體無論兩漢難至苦心摹倣時隔一塵即為建安不可墮落六朝一語為三謝縱極排麗不可雜入唐音小詩欲作王韋長篇欲作老杜便應全用其體苐不可羊質虎皮虎頭蛇尾詞曲家非當家本色雖麗語博學無用况此道乎詩有古人所不忌而今人以為病者摘瑕者因而酷病之將併古人無所容非也然今古寬嚴不同作詩者既知是瑕不妨併去如太史公蔓辭纍句常多班孟堅洗削殆盡非謂班勝於司馬顧在班分量宜爾今以古人詩病後人宜避者略具數條以見其餘如有重韻者若任彥升哭范僕射一詩三壓情字老杜排律亦時誤有重韻有重字者若沈雲卿天長地濶之三何至王摩詰尤多若暮雲空磧玉靶角弓二馬俱壓在下一從歸白社不復到青門青菰臨水映白鳥向山翻青白重出此皆是失點檢處必不可借以自文也又如風雲雷雨有二聨中接用者一二三四有八句中六見者今可以為法邪此等病盛唐常有之獨老杜最少蓋其詩即景後必下意也又其最隱者如雲卿嵩山石淙前聨云行漏香罏次聨云神鼎帝壺俱壓末字岑嘉州雲隨馬雨洗兵花迎蓋桞拂旌四言一法摩詰獨坐悲雙鬢白髮終難變語異意重九成宫避暑三四衣上鏡中五六林下巖前在彼正自不覺今用之能無受人揶揄至於失拈之句摩詰嘉州特多殊不妨其美然就至美中亦覺有微缺陷如吾人不能運便自誦不流暢不為可也至於首句出韻晚唐作俑宋人濫觴尤不可學六臣注文選極鄙繆無足道乃至王導謝玄同時而拒苻堅諸如此類不少惟李善注旁引諸家句字必有援據大資博雅然亦有牽合古書而不究章旨如曺顔逺思友人詩清陽未可俟善引詩以為清陽婉兮人之眉目間也然於章法句法通未體貼其詩本言霖潦玄隂與歐陽子别旬朔而思之甚故曰褰裳以應潦也清陽未可俟猶曰河清難俟耳蓋以清陽反霖潦玄隂也其意自指日出或即青陽而誤加三點如上褰裳誤作寒裳字耳何必泥毛詩清陽令句不可解耶又如晨風之訓為鷹而李陵晨風自從風解翠微者山半也古詩亦有别用者豈可盡泥唐律由初而盛由盛而中由中而晚時代聲調故自必不可同然亦有初而逗盛盛而逗中中而逗晚者何則逗者變之漸也非逗故無繇變如四詩之有變風變雅便是離騷逺祖子美七言律之有拗體其猶變風變雅乎唐律之由盛而中極是盛衰之介然王維錢起實相倡酬子美全集半是大厯以後其間逗漏實有可言聊指一二如右丞明到衡山篇嘉州函谷磻溪句隱隱錢劉盧李間矣至於大厯十才子其間豈無盛唐之句蓋聲氣猶未相隔也學者固當嚴於格調然必謂盛唐人無一語落中中唐人無一語入盛則亦固哉其言詩矣少陵故多變態其詩有深句有雄句有老句有秀句有麗句有險句有拙句有纍句後世别為大家特髙於盛唐者以其有深句雄句老句也而終不失為盛唐者以其有秀句麗句也輕淺子弟往往有薄之者則以其有險句拙句纍句也不知其愈險愈老正是此老獨得處故不足難之獨拙纍之句吾不能為掩瑕雖然更千百世無能勝之者何要曰無露句耳其意何嘗不自髙自任然其詩曰文章千古事得失寸心知曰新詩句句好應任老夫傳溫然其辭而隱然言外何嘗有所謂吾道主盟代興哉自少陵逗漏此趣而大智大力者發揮畢盡至使吠聲之徒羣肆撏剝遐哉唐音永不可復噫嘻慎之律詩句有必不可入古者古詩字有必不可為律者然不多熟古詩未有能以律詩髙天下者也初學輩不知苦辣往往謂五言古詩易就率爾成篇因自詫好古薄後世律不為不知律尚不工豈能工古徒為兩失而巳詞人拈筆成律如左右逢源一遇古體竟日吟哦常恐失却本相樂府兩字到老搖手不敢輕道李西涯楊鐵崖都曾做過何嘗是來唐人無五言古就中有酷似樂府語而不傷氣骨者得杜工部四語曰兔絲附蓬麻引蔓故不長嫁女與征夫不如棄路傍不必其調云何而直是見道者得王右丞四語曰曽是巢許淺始知堯舜深蒼生詎有物黃屋如喬林太白逺别離篇意最參錯難解小時誦之都不能尋意緒范德機髙廷禮勉作解事語了與詩意無關細繹之始得作者意其太白晚年之作邪先是肅宗即位靈武玄宗不得已稱上皇迎歸大內又為李輔國劫而幽之太白憂憤而作此詩因今度古將謂堯舜事亦有可疑曰堯舜禪禹罪肅宗也曰龍魚鼠虎誅輔國也故隱其辭托興英皇而以逺别離名篇風人之體善刺欲言之無罪耳然幽囚野死則已露本相矣古來原有此種傳竒議論曺丕下壇曰舜禹之事吾知之矣太白故非創語試以此意尋次讀之自當手舞足蹈李于鱗七言律俊潔響亮余兄極推轂之海內為詩者爭事剽竊紛紛刻鶩至使人厭余謂學于鱗不如學老杜學老杜尚不如學盛唐何者老杜結搆自為一家言盛唐散漫無宗人各自以意象聲響得之政如韓桞之文何有不從左史來者彼學而成為韓為桞吾却又從韓桞學便落一塵矣輕薄子遽笑韓桞非古與夫一字一語必步趨二家者皆非也今人作詩多從中對聨起往往得聨多而韻不協勢既不能易韻以就我又不忍以長物棄之因就一題衍為衆律然聨雖旁出意盡聨中而起結之意每苦無餘於是别生支節而傅會或即一意以支吾掣襟露肘浩博之士猶然架屋疊床貧儉之才彌窘所以秋興八首寥寥難繼不其然乎每每思之未得其解忽悟少陵諸作多有漫興時於篇中取題意興不局豈非柏梁之餘材創為别館武昌之剩竹貯作船釘英雄欺人頗窺伎倆有識之士能無取裁談藝者有謂七言律一句不可兩入故事一篇中不可重犯故事此病犯者故少能拈出亦見精嚴然吾以為皆非妙悟也作詩到神情傳處隨分自佳下得不覺痕迹縱使一句兩入兩句重犯亦自無傷如太白峨眉山月歌四句入地名者五然古今目為絶唱殊不厭重蜂腰鶴膝雙聲疊韻休文三尺法也古今犯者不少寧盡被汰邪于鱗選唐七言絶句取王龍標秦時明月漢時關為第一以語人多不服于鱗意止擊節秦時明月四字耳必欲壓卷還當於王翰葡萄美酒王之渙黃河逺上二詩求之晚唐詩萎薾無足言獨七言絶句膾炙人口其妙至欲勝盛唐愚謂絶句覺妙正是晚唐未妙處其勝盛唐乃其所以不及盛唐也絶句之源出於樂府貴有風人之致其聲可歌其趣在有意無意之間使人莫可捉著盛唐惟青蓮龍標二家詣極李更自然故居王上晚唐快心露骨便非本色議論髙處逗宋詩之徑聲調卑處開大石之門今世五尺之童才拈聲律便能薄棄晚唐自傅初盛有稱大厯而下色便赧然然使誦其詩果為初邪盛邪中邪晚邪大都取法固當上宗論詩亦莫輕道詩必自運而後可以辨體詩必成家而後可以言格晚唐詩人如溫庭筠之才許渾之致見豈五尺之童下直風會使然耳覽者悲其衰運可也故豫謂今之作者但須真才實學本性求情且莫理論格調李頎七言律最響亮整肅忽於逺公遁迹詩第二句下一拗體餘七句皆平正一不合也開山二字最不古二不合也開山幽居文理不接三不合也重上一山字四不合也余謂必有誤苦思得之曰必開士也易一字而對仗流轉盡祛四失矣余兄大喜遂以書藝苑巵言余後觀郎士元詩云髙僧本姓竺開士舊名林乃知襲用頎詩益以自信詩稱發端之妙者謝宣城而後王右軍一人而已郎士元詩起句云暮蟬不可聽落葉豈堪聞合掌可笑高仲武乃云昔人謂謝眺工於發端比之於今有慚沮矣若謂出於譏戲何得入選果謂發端工乎謝宣城地下當撫掌大笑崔郎中作黃鶴樓詩青蓮短氣後題鳯凰臺古今目為勍敵識者謂前六句不能當結語深悲慷慨差足勝耳然余意更有不然無論中二聨不能及即結語亦大有辨言詩須道興比賦如日暮鄉關興而賦也浮雲蔽日比而賦也以此思之使人愁三字雖同孰為當乎日暮鄉關煙波江上本無指著登臨者自生愁耳故曰使人愁煙波使之愁也浮雲蔽日長安不見逐客自應愁寧須使之青蓮才情標映萬載寧以余言重輕尺有所短寸有所長竊以為此詩不逮非一端也如有罪我者則不敢辭常徴君贈王龍標詩有松際露微月清光猶為君之句膾炙人口然王子安詠風詩云日落山水靜為君起松聲則已先標此義矣二詩句雅堪作配未易優劣也錢員外詩長信宜春句於晴雪妙極形容膾炙人口其源得之初唐然從初竟落中唐了不與盛唐相關何者愈巧則愈逺杜必簡性好矜誕至欲衙官屈宋然詩自佳華於子昂質於沈宋一代作家也流芳未泯乃有杜陵鬯其家風盛哉然布衣光大許身稷契屈宋又不足言矣一日偶誦賈島桑乾絶句見謝枋得注云旅寓十年交遊歡愛與故鄉無異一旦别去豈能無情渡桑乾而望并州反以為故鄉也不覺大笑拈以問玉山程生曰詩如此解否程生曰向如此解余謂此島自思鄉作何曽與并州有情其意恨久客并州逺隔故鄉今非惟不能歸反北渡桑乾還望并州又是故鄉矣并州且不得住何况得歸咸陽此島意也謝注有分毫相似否程始歎賞以為聞所未聞不知向自聽夢中語耳古人云秀色若可餐余謂此言惟毛嬙西施昭君太真曺植謝朓李白王維可以當之而司馬長卿夫婦各擅尤以為難至於平原清河急難並秀飛燕合德孿生雙絶亦各際其盛矣近世無絶代佳人詩人乃似不乏詩有必不能廢者雖衆體未備而獨擅一家之長如孟浩然洮洮易盡止以五言雋永千載並稱王孟我明其徐昌榖髙子業乎二君詩大不同而皆巧於用短徐能以髙韻勝有蟬蛻軒舉之風髙能以深情勝有秋閨愁婦之態更千百年李何尚有廢興二君必無絶響所謂成一家言斷在君采稚欽之上庭實而下益無論矣髙季迪才情有餘使生𢎞正李何之間絶塵破的未知鹿死誰手楊張徐故是草昧之雄勝國餘業不中與髙作僕子美而後能為其言而真足追配者獻吉于鱗兩家耳以五言言之獻吉以氣合于鱗以趣合夫人語趣似髙於氣然須學者自詠自求誰當更合七言律獻吉求似於句而求專於骨于鱗求似於情而求勝於句然則無差乎曰噫于鱗秀余嘗服明卿五七言律謂他人詩多於髙處失穩明卿詩多於穩處藏髙與于鱗作身後戰場未知鹿死誰手家兄讞獄三輔時五言詩刻意老杜深情老句便自旗鼓中原所未滿者意多於景耳青州而後情景雜出似不必盡宗矣每一題到茫然思不相屬幾謂無措沉思久之如瓴水去窒亂絲抽緒種種縱橫坌集却於此時要下剪裁手段寧割愛勿貪多又如數萬健兒人各自為一營非得大將軍方略不能整頓攝服使一軍無譁若爾朱榮處貼葛榮百萬衆求之詩家誰當為比生平閉目搖手不道長慶集如吾吳唐伯虎則尤長慶之下乘也閻秀卿刻其悵悵擁鼻二詩余每見之輒悢悢悲歌不已詞人云何物是情濃少年輩酷愛情詩如此情少年那得解友人張伯起詩云而今秋老春情薄漠漠寒江水自流袁魯望亟為余稱之伯起於是時年僅強立其於情故早逹此道中項槖甘羅也今伯起風流如故而魯望巳數載異物悲夫世人厭常喜新之罪夷於貴耳賤目自李何之後繼以于鱗海內為其家言者多遂蒙刻鶩之厭驟而一士能為樂府新聲倔強無識者便謂不經人道語目曰上乘足使耆宿盡廢不知詩不在體顧取諸情性何如耳不惟情性之求而但以新聲取異安知今日不經人道語不為異日陳陳之粟乎嗚呼才難豈惟才難識亦不易作詩道一淺字不得改道一深字又不得其妙政在不深不淺有意無意之間嘗謂作詩者初命一題神情不屬便有一種供給應付之語畏難怯思即以充役故每不得佳余戲謂河下輿𨽻須驅遣另換正身能破此一關沉思忽至種種真相見矣閩人家能占俾而不甚工詩國初林鴻髙廷禮唐泰輩皆稱能詩號閩南十才子然出楊徐下逺甚無論季迪其後氣骨崚崚差堪旗鼓中原者僅一鄭善夫耳其詩雖多摹杜猶是邊徐薛王之亞林尚書貞恆修福志志善夫云時非天寶地靡拾遺殆無病而呻吟云至以林釴傅汝舟相伯仲又云釴與善夫頗為鄉論所訾過矣閩人三百年來僅得一善夫詩即瑕當為掩善夫雖無竒節不至作文人無行殆非實録也友人陳玉叔謂數語却中善夫之病余謂以入詩品則為雅談入傳記則傷厚道玉叔大以為然林公余早年知已獨此一段不敢傅會此非特為善夫亦為七閩文人吐氣也藝圃擷餘
